<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AU CGPA Pro</title>
    <style>
        :root { --bg: #050505; --accent: #007AFF; --card: #121212; --text: #ffffff; --text-dim: #888; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { text-align: center; padding: 10px 0; }
        h1 { font-size: 18px; margin: 0; }
        .sub { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        #list { flex: 1; overflow-y: auto; padding-right: 5px; margin: 15px 0; }
        #list::-webkit-scrollbar { width: 4px; }
        #list::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .row { display: grid; grid-template-columns: 30px 1fr 1fr 40px; gap: 8px; align-items: center; background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 8px; }
        input { background: #222; border: none; border-radius: 8px; padding: 12px; color: white; text-align: center; font-size: 14px; width: 100%; }
        input:focus { outline: 2px solid var(--accent); }
        
        .btn-del { color: #ff3b30; font-weight: bold; text-align: center; font-size: 20px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 10px; }
        button { background: var(--accent); border: none; color: white; padding: 14px; border-radius: 12px; font-weight: 600; }
        
        .result-bar { background: var(--card); padding: 15px; border-radius: 16px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #333; }
        .res-val { font-size: 24px; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>Anna University CGPA</h1>
        <div class="sub">Academic Engine v2026</div>
    </header>

    <div id="list"></div>

    <div class="controls">
        <button onclick="addSem()">+ SEMESTER</button>
        <button onclick="reset()" style="background:#333">RESET</button>
    </div>

    <div class="result-bar">
        <div>
            <div style="font-size: 9px; color: var(--text-dim);">CGPA</div>
            <div class="res-val" id="cgpa">0.00</div>
        </div>
        <div>
            <div style="font-size: 9px; color: var(--text-dim);">TOTAL CREDITS</div>
            <div class="res-val" id="credits" style="color:#fff">0</div>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('au_cgpa')) || [{sgpa: '', cr: ''}];

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = data.map((s, i) => `
                <div class="row">
                    <div style="font-size:10px; color:#555">S${i+1}</div>
                    <input type="number" inputmode="decimal" placeholder="SGPA" value="${s.sgpa}" oninput="update(${i}, 'sgpa', this.value)">
                    <input type="number" inputmode="decimal" placeholder="CR" value="${s.cr}" oninput="update(${i}, 'cr', this.value)">
                    <div class="btn-del" onclick="del(${i})">×</div>
                </div>
            `).join('');
            calc();
        }

        function update(i, f, v) {
            data[i][f] = v;
            localStorage.setItem('au_cgpa', JSON.stringify(data));
            calc();
        }

        function calc() {
            let pts = 0, crs = 0;
            data.forEach(s => {
                let sg = parseFloat(s.sgpa), c = parseFloat(s.cr);
                if(!isNaN(sg) && !isNaN(c)) { pts += (sg * c); crs += c; }
            });
            document.getElementById('cgpa').innerText = crs ? (pts/crs).toFixed(2) : '0.00';
            document.getElementById('credits').innerText = crs;
        }

        function addSem() { data.push({sgpa: '', cr: ''}); render(); }
        function del(i) { if(data.length > 1) { data.splice(i, 1); render(); } }
        function reset() { localStorage.clear(); data = [{sgpa: '', cr: ''}]; render(); }
        render();
    </script>
</body>
</html>
