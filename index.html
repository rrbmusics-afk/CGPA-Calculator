<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AU CGPA Pro</title>
    <style>
        :root { --bg: #000000; --accent: #0A84FF; --card: #1C1C1E; --text: #FFFFFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; }
        
        body { 
            background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; padding: 20px;
        }

        header { text-align: center; margin-bottom: 15px; flex-shrink: 0; }
        h1 { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }

        #list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        
        /* Entrance Animation */
        .row { 
            display: grid; grid-template-columns: 30px 1fr 1fr 40px; gap: 8px; align-items: center;
            background: var(--card); padding: 10px; border-radius: 14px;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        input { 
            background: #2C2C2E; border: none; border-radius: 8px; padding: 12px; 
            color: white; text-align: center; font-size: 15px; width: 100%;
        }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-shrink: 0; }
        button { background: var(--accent); border: none; color: white; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 14px; }

        .result-footer { 
            background: #1C1C1E; padding: 15px; border-radius: 20px; margin-top: 15px;
            display: flex; justify-content: space-around; flex-shrink: 0; border: 1px solid #333;
        }
        .res-val { font-size: 22px; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>

    <header><h1>Anna University CGPA</h1></header>

    <div id="list"></div>

    <div class="btn-row">
        <button onclick="addSem()">+ ADD SEM</button>
        <button style="background:#3A3A3C" onclick="reset()">RESET</button>
    </div>

    <div class="result-footer">
        <div><div style="font-size:9px; color:#888">CGPA</div><div class="res-val" id="cgpa">0.00</div></div>
        <div><div style="font-size:9px; color:#888">CREDITS</div><div class="res-val" id="credits">0</div></div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('au_cgpa')) || [{sgpa: '', cr: ''}];

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = data.map((s, i) => `
                <div class="row">
                    <div style="font-size:10px; color:#666">S${i+1}</div>
                    <input type="number" inputmode="decimal" placeholder="SGPA" value="${s.sgpa}" oninput="update(${i}, 'sgpa', this.value)">
                    <input type="number" inputmode="decimal" placeholder="CR" value="${s.cr}" oninput="update(${i}, 'cr', this.value)">
                    <div style="text-align:center; color:#FF453A; font-weight:bold" onclick="del(${i})">✕</div>
                </div>
            `).join('');
            calc();
        }

        function update(i, f, v) { data[i][f] = v; localStorage.setItem('au_cgpa', JSON.stringify(data)); calc(); }
        function calc() {
            let p = 0, c = 0;
            data.forEach(s => { let sg = parseFloat(s.sgpa), cr = parseFloat(s.cr); if(!isNaN(sg) && !isNaN(cr)) { p += (sg * cr); c += cr; } });
            document.getElementById('cgpa').innerText = c ? (p/c).toFixed(2) : '0.00';
            document.getElementById('credits').innerText = c;
        }
        function addSem() { data.push({sgpa: '', cr: ''}); render(); }
        function del(i) { if(data.length > 1) { data.splice(i, 1); render(); } }
        function reset() { localStorage.clear(); data = [{sgpa: '', cr: ''}]; render(); }
        render();
    </script>
</body>
</html>
