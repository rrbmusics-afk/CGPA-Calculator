<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AU CGPA Calculator</title>
    <style>
        /* CSS Reset & Hardware Accelerated Layout */
        :root { --bg: #000; --accent: #007AFF; --card: #1C1C1E; --text: #FFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        body { 
            margin: 0; padding: 10px; background: var(--bg); color: var(--text);
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Fixed Header */
        .app-header { flex: 0 0 auto; text-align: center; padding-bottom: 10px; }
        .app-header h1 { font-size: 16px; margin: 0; color: var(--accent); }

        /* Scrollable Middle */
        .content-area { 
            flex: 1 1 auto; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 8px; scroll-behavior: smooth; padding: 2px;
        }

        /* Responsive Row */
        .row { 
            display: grid; grid-template-columns: 30px 1fr 1fr 35px; gap: 8px; align-items: center;
            background: var(--card); padding: 10px; border-radius: 12px;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input { 
            background: #2C2C2E; border: 1px solid #333; border-radius: 8px; padding: 10px; 
            color: white; text-align: center; font-size: 14px; width: 100%;
        }

        /* Fixed Bottom Action Panel */
        .bottom-panel { flex: 0 0 auto; background: var(--bg); border-top: 1px solid #333; padding-top: 10px; }
        .stats-row { display: flex; justify-content: space-between; padding: 5px 10px 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border-radius: 10px; border: none; font-weight: 600; font-size: 13px; }
        .btn-add { background: var(--accent); color: white; }
        .btn-res { background: #333; color: white; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>Anna University CGPA</h1>
    </div>

    <div class="content-area" id="list">
        <!-- Rows injected here -->
    </div>

    <div class="bottom-panel">
        <div class="stats-row">
            <div><small style="color:#666">CGPA</small><div id="cgpa" style="font-weight:800; font-size:20px;">0.00</div></div>
            <div style="text-align:right;"><small style="color:#666">TOTAL CREDITS</small><div id="credits" style="font-weight:800; font-size:20px;">0</div></div>
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="add()">+ ADD SEM</button>
            <button class="btn-res" onclick="reset()">RESET</button>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('au_data')) || [{sgpa: '', cr: ''}];
        const list = document.getElementById('list');

        function render() {
            list.innerHTML = data.map((s, i) => `
                <div class="row">
                    <div style="font-size:10px; color:#888;">S${i+1}</div>
                    <input type="number" inputmode="decimal" placeholder="SGPA" value="${s.sgpa}" oninput="update(${i}, 'sgpa', this.value)">
                    <input type="number" inputmode="decimal" placeholder="CR" value="${s.cr}" oninput="update(${i}, 'cr', this.value)">
                    <div onclick="del(${i})" style="color:#ff3b30; text-align:center; font-weight:bold;">✕</div>
                </div>
            `).join('');
            calc();
        }

        function update(i, f, v) { data[i][f] = v; localStorage.setItem('au_data', JSON.stringify(data)); calc(); }
        function calc() {
            let p = 0, c = 0;
            data.forEach(s => { let sg = parseFloat(s.sgpa), cr = parseFloat(s.cr); if(!isNaN(sg) && !isNaN(cr)) { p += (sg * cr); c += cr; } });
            document.getElementById('cgpa').innerText = c ? (p/c).toFixed(2) : '0.00';
            document.getElementById('credits').innerText = c;
        }
        function add() { data.push({sgpa: '', cr: ''}); render(); list.scrollTop = list.scrollHeight; }
        function del(i) { if(data.length > 1) { data.splice(i, 1); render(); } }
        function reset() { localStorage.clear(); data = [{sgpa: '', cr: ''}]; render(); }
        render();
    </script>
</body>
</html>
