<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Academic Engine</title>
    <style>
        /* 
           Architectural Typography Stack:
           - Uses tabular-nums for stable UI metrics.
           - SF Pro/Inter ensures high legibility.
        */
        :root { 
            --bg: #000000; 
            --ui: #121212; 
            --text: #FFFFFF; 
            --text-dim: #888888;
            --accent: #0A84FF; 
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: var(--font-main); height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            font-feature-settings: "tnum" on, "lnum" on; /* Tabular Numerals for stable UI */
        }
        
        .header { 
            padding: 24px 20px 12px; font-weight: 800; font-size: 11px; 
            letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim);
        }
        
        #canvas { flex: 1; overflow-y: auto; padding: 0 20px; }
        
        .entry-row { 
            display: grid; grid-template-columns: 1fr 1fr 30px; gap: 12px; margin-bottom: 12px; align-items: center; 
        }
        
        select, input { 
            background: var(--ui); border: 1px solid #222; color: white; padding: 14px; 
            border-radius: 12px; font-size: 15px; font-weight: 500; appearance: none;
        }
        
        .footer { background: #0a0a0a; border-top: 1px solid #1a1a1a; padding: 20px; }
        .metrics { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .val { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
        
        button { 
            background: var(--accent); color: white; border: none; padding: 16px; 
            border-radius: 14px; font-weight: 600; font-size: 14px; letter-spacing: -0.01em; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">ANNA UNIVERSITY ACADEMIC ENGINE</div>
    <div id="canvas"></div>

    <div class="footer">
        <div class="metrics">
            <div><div style="color:var(--text-dim); font-size:10px; text-transform:uppercase; letter-spacing:0.1em;">CGPA</div><div id="cgpa" class="val">0.00</div></div>
            <div style="text-align:right;"><div style="color:var(--text-dim); font-size:10px; text-transform:uppercase; letter-spacing:0.1em;">TOTAL CREDITS</div><div id="cr-tot" class="val">0</div></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button onclick="addEntry()">ADD SUBJECT</button>
            <button style="background:#1a1a1a" onclick="reset()">RESET</button>
        </div>
    </div>

    <script>
        const GRADE_MAP = { 'O': 10, 'A+': 9, 'A': 8, 'B+': 7, 'B': 6, 'C': 5, 'RA': 0 };
        let stack = JSON.parse(localStorage.getItem('au_core')) || [];

        function render() {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            stack.forEach((item, i) => {
                const row = document.createElement('div');
                row.className = 'entry-row';
                row.innerHTML = `
                    <select onchange="update(${i}, 'grade', this.value)">
                        ${Object.keys(GRADE_MAP).map(g => `<option value="${g}" ${item.grade===g?'selected':''}>${g}</option>`).join('')}
                    </select>
                    <input type="number" placeholder="Credits" value="${item.cr}" oninput="update(${i}, 'cr', this.value)">
                    <div style="color:#444; text-align:center; cursor:pointer;" onclick="del(${i})">✕</div>
                `;
                canvas.appendChild(row);
            });
            compute();
        }

        function update(i, f, v) { stack[i][f] = v; localStorage.setItem('au_core', JSON.stringify(stack)); compute(); }
        function compute() {
            let pts = 0, crs = 0;
            stack.forEach(s => { pts += (GRADE_MAP[s.grade] || 0) * (parseFloat(s.cr) || 0); crs += parseFloat(s.cr) || 0; });
            document.getElementById('cgpa').innerText = crs ? (pts/crs).toFixed(2) : '0.00';
            document.getElementById('cr-tot').innerText = crs;
        }
        function addEntry() { stack.push({grade: 'O', cr: ''}); render(); }
        function del(i) { stack.splice(i, 1); render(); }
        function reset() { stack = []; localStorage.clear(); render(); }
        render();
    </script>
</body>
</html>
