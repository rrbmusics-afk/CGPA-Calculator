<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AU CGPA Pro</title>
    <style>
        :root { --bg: #000; --accent: #0A84FF; --card: #1C1C1E; --text: #FFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; }
        
        /* Force screen containment */
        body { 
            background: var(--bg); color: var(--text); height: 100vh; width: 100vw; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; overflow: hidden;
        }

        header { flex: 0 0 auto; text-align: center; padding: 5px 0; }
        h1 { font-size: 14px; margin: 0; }

        /* Scrollable list area pinned between header and footer */
        #list { 
            flex: 1 1 auto; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 8px; margin: 10px 0; padding-right: 5px;
        }

        .row { 
            display: grid; grid-template-columns: 25px 1fr 1fr 30px; gap: 6px; align-items: center;
            background: var(--card); padding: 8px; border-radius: 10px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        input { 
            background: #2C2C2E; border: none; border-radius: 6px; padding: 10px 5px; 
            color: white; text-align: center; font-size: 13px; width: 100%;
        }

        .btn-row { flex: 0 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: var(--accent); border: none; color: white; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 13px; }

        .result-bar { 
            flex: 0 0 auto; background: #1C1C1E; padding: 12px; border-radius: 15px; margin-top: 10px;
            display: flex; justify-content: space-around; align-items: center; border: 1px solid #333;
        }
        .res-val { font-size: 20px; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>

    <header><h1>Anna University CGPA</h1></header>

    <div id="list"></div>

    <div class="btn-row">
        <button onclick="addSem()">+ ADD SEM</button>
        <button style="background:#3A3A3C" onclick="reset()">RESET</button>
    </div>

    <div class="result-bar">
        <div><div style="font-size:8px; color:#888">CGPA</div><div class="res-val" id="cgpa">0.00</div></div>
        <div><div style="font-size:8px; color:#888">CREDITS</div><div class="res-val" id="credits">0</div></div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('au_cgpa')) || [{sgpa: '', cr: ''}];
        function render() {
            const list = document.getElementById('list');
            list.innerHTML = data.map((s, i) => `
                <div class="row">
                    <div style="font-size:9px; color:#666">S${i+1}</div>
                    <input type="number" inputmode="decimal" placeholder="SGPA" value="${s.sgpa}" oninput="update(${i}, 'sgpa', this.value)">
                    <input type="number" inputmode="decimal" placeholder="CR" value="${s.cr}" oninput="update(${i}, 'cr', this.value)">
                    <div style="text-align:center; color:#FF453A; font-weight:bold" onclick="del(${i})">✕</div>
                </div>
            `).join('');
            calc();
        }
        function update(i, f, v) { data[i][f] = v; localStorage.setItem('au_cgpa', JSON.stringify(data)); calc(); }
        function calc() {
            let p = 0, c = 0;
            data.forEach(s => { let sg = parseFloat(s.sgpa), cr = parseFloat(s.cr); if(!isNaN(sg) && !isNaN(cr)) { p += (sg * cr); c += cr; } });
            document.getElementById('cgpa').innerText = c ? (p/c).toFixed(2) : '0.00';
            document.getElementById('credits').innerText = c;
        }
        function addSem() { data.push({sgpa: '', cr: ''}); render(); }
        function del(i) { if(data.length > 1) { data.splice(i, 1); render(); } }
        function reset() { localStorage.clear(); data = [{sgpa: '', cr: ''}]; render(); }
        render();
    </script>
</body>
</html>
