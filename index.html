<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Academic Engine</title>
    <style>
        :root { --bg: #050505; --ui: #1a1a1a; --text: #f0f0f0; --accent: #007AFF; --err: #ff3b30; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .nav { padding: 16px; text-align: center; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; border-bottom: 1px solid #222; }
        #canvas { flex: 1; overflow-y: auto; padding: 12px; }
        
        .entry-row { display: grid; grid-template-columns: 1fr 1fr 30px; gap: 8px; margin-bottom: 8px; align-items: center; }
        input, select { background: var(--ui); border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; font-size: 14px; }
        
        .footer { background: #0a0a0a; border-top: 1px solid #222; padding: 16px; }
        .metrics { display: flex; justify-content: space-between; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav">ANNA UNIVERSITY ACADEMIC CALCULATOR</div>
    <div id="canvas"></div>

    <div class="footer">
        <div class="metrics">
            <div><span style="color:#666; font-size:10px;">CGPA</span><div id="cgpa" style="font-size:22px; font-weight:800;">0.00</div></div>
            <div style="text-align:right;"><span style="color:#666; font-size:10px;">CREDITS</span><div id="cr-tot" style="font-size:22px; font-weight:800;">0</div></div>
        </div>
        <div class="btn-grid">
            <button onclick="addEntry()">+ SUBJECT</button>
            <button style="background:#222" onclick="reset()">CLEAR</button>
        </div>
    </div>

    <script>
        // Industrial LUT: Grade to Point mapping
        const GRADE_MAP = { 'O': 10, 'A+': 9, 'A': 8, 'B+': 7, 'B': 6, 'C': 5, 'RA': 0 };
        let stack = JSON.parse(localStorage.getItem('au_core')) || [];

        function render() {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            stack.forEach((item, i) => {
                const row = document.createElement('div');
                row.className = 'entry-row';
                row.innerHTML = `
                    <select onchange="update(${i}, 'grade', this.value)">
                        ${Object.keys(GRADE_MAP).map(g => `<option value="${g}" ${item.grade===g?'selected':''}>${g}</option>`).join('')}
                    </select>
                    <input type="number" placeholder="Credits" value="${item.cr}" oninput="update(${i}, 'cr', this.value)">
                    <div style="color:var(--err); text-align:center; cursor:pointer;" onclick="del(${i})">✕</div>
                `;
                canvas.appendChild(row);
            });
            compute();
        }

        function update(i, f, v) {
            stack[i][f] = v;
            localStorage.setItem('au_core', JSON.stringify(stack));
            compute();
        }

        function compute() {
            let pts = 0, crs = 0;
            stack.forEach(s => {
                let g = GRADE_MAP[s.grade] || 0;
                let c = parseFloat(s.cr) || 0;
                pts += (g * c);
                crs += c;
            });
            document.getElementById('cgpa').innerText = crs ? (pts/crs).toFixed(2) : '0.00';
            document.getElementById('cr-tot').innerText = crs;
        }

        function addEntry() { stack.push({grade: 'O', cr: ''}); render(); }
        function del(i) { stack.splice(i, 1); render(); }
        function reset() { stack = []; localStorage.clear(); render(); }
        
        render();
    </script>
</body>
</html>
