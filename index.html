<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CGPA | AetherCore</title>
    <style>
        :root {
            --bg: #05070a;
            --accent: #3d8af7;
            --surface: #10141a;
            --text-p: #f4f4f5;
            --text-s: #6b7280;
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg); 
            color: var(--text-p); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { width: 100%; max-width: 400px; margin-bottom: 24px; padding-top: 20px; }
        .title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        .subtitle { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        .container { width: 100%; max-width: 400px; }
        
        .sem-row { 
            display: grid; grid-template-columns: 32px 1fr 1fr 40px; gap: 10px; align-items: center;
            background: var(--surface); padding: 12px; border-radius: var(--radius); margin-bottom: 10px;
        }
        
        input { 
            background: #1a1f26; border: 1px solid #2d3748; border-radius: 12px; padding: 14px 8px;
            color: white; text-align: center; font-size: 15px; font-weight: 500; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn { 
            width: 100%; padding: 16px; border-radius: var(--radius); border: none; font-weight: 600; cursor: pointer; margin-top: 8px; font-size: 14px;
        }
        .btn-add { background: var(--accent); color: white; }
        .btn-reset { background: transparent; color: var(--text-s); font-size: 12px; }

        .res-card { 
            margin-top: 20px; background: #0c0f14; border: 1px solid #1a1f26; 
            padding: 24px; border-radius: var(--radius); text-align: center;
        }
        .res-val { font-size: 48px; font-weight: 800; color: var(--accent); letter-spacing: -2px; }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="title">CGPA Analysis</h1>
        <div class="subtitle">AetherCore Engine v2.0</div>
    </header>

    <div class="container">
        <div id="sem-list"></div>
        <button class="btn btn-add" onclick="addSemester()">+ ADD SEMESTER</button>
        <button class="btn btn-reset" onclick="resetAll()">RESET ALL DATA</button>

        <div class="res-card">
            <div style="font-size: 11px; color: var(--text-s); margin-bottom: 8px;">FINAL CGPA</div>
            <div class="res-val" id="cgpa-out">0.00</div>
            <div style="font-size: 12px; color: var(--text-s); margin-top: 10px;">CREDITS: <span id="cred-out">0</span></div>
        </div>
    </div>

    <script>
        let semesters = JSON.parse(localStorage.getItem('cgpa_data')) || [{sgpa: '', credits: ''}];

        function render() {
            const list = document.getElementById('sem-list');
            list.innerHTML = semesters.map((sem, i) => `
                <div class="sem-row">
                    <div style="font-size:9px; color:var(--text-s); font-weight:800;">S${i+1}</div>
                    <input type="number" inputmode="decimal" step="0.01" placeholder="SGPA" value="${sem.sgpa}" oninput="update(${i}, 'sgpa', this.value)">
                    <input type="number" inputmode="decimal" placeholder="CR" value="${sem.credits}" oninput="update(${i}, 'credits', this.value)">
                    <div style="color:var(--text-s); font-size:18px; text-align:center;" onclick="remove(${i})">×</div>
                </div>
            `).join('');
            calculate();
        }

        function update(i, field, val) {
            semesters[i][field] = val;
            localStorage.setItem('cgpa_data', JSON.stringify(semesters));
            calculate();
        }

        function addSemester() { semesters.push({sgpa: '', credits: ''}); render(); }
        
        function remove(i) { if(semesters.length > 1) { semesters.splice(i, 1); render(); } }

        function calculate() {
            let w = 0, c = 0;
            semesters.forEach(s => {
                let sg = parseFloat(s.sgpa), cr = parseFloat(s.credits);
                if(!isNaN(sg) && !isNaN(cr)) { w += (sg * cr); c += cr; }
            });
            document.getElementById('cgpa-out').innerText = c > 0 ? (w / c).toFixed(2) : '0.00';
            document.getElementById('cred-out').innerText = c;
        }

        function resetAll() {
            localStorage.removeItem('cgpa_data');
            semesters = [{sgpa: '', credits: ''}];
            render();
        }

        render();
    </script>
</body>
</html>
